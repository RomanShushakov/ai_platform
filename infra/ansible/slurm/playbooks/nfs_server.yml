---
- name: Configure NFS server on Jetson
  hosts: slurm_worker
  become: true
  gather_facts: true

  pre_tasks:
    - name: Load NFS vars explicitly
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../../vars/nfs.yml"

    - name: Load host-specific vars explicitly
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../../host_vars/{{ inventory_hostname }}.yml"

  tasks:
    - name: Show NFS server target
      ansible.builtin.debug:
        msg:
          - "Configuring NFS server on {{ inventory_hostname }}"
          - "Export dir: {{ nfs_export_dir }}"

    - name: Install NFS server package
      ansible.builtin.apt:
        name: nfs-kernel-server
        state: present
        update_cache: true

    - name: Ensure export directory exists
      ansible.builtin.file:
        path: "{{ nfs_export_dir }}"
        state: directory
        owner: roman
        group: roman
        mode: "0755"

    - name: Deploy /etc/exports
      ansible.builtin.copy:
        dest: /etc/exports
        owner: root
        group: root
        mode: "0644"
        content: |
          {{ nfs_export_dir }} {{ nfs_export_networks | join(' ') }}

    - name: Ensure NFS server service is enabled
      ansible.builtin.service:
        name: nfs-server
        enabled: true
      failed_when: false

    - name: Ensure nfs-kernel-server service is enabled
      ansible.builtin.service:
        name: nfs-kernel-server
        enabled: true
      failed_when: false

    - name: Reload exported filesystems
      ansible.builtin.command: exportfs -ra
      changed_when: true

    - name: Restart NFS server service if present
      ansible.builtin.service:
        name: nfs-server
        state: restarted
      failed_when: false

    - name: Restart nfs-kernel-server service if present
      ansible.builtin.service:
        name: nfs-kernel-server
        state: restarted
      failed_when: false

    - name: Show NFS server completion
      ansible.builtin.debug:
        msg:
          - "NFS server configured on {{ inventory_hostname }}"
