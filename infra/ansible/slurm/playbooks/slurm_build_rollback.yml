---
- name: Roll back Slurm source build
  hosts: all
  become: true
  gather_facts: false

  pre_tasks:
    - name: Load Slurm build vars explicitly
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../../vars/slurm_build.yml"

  tasks:
    - name: Show build rollback target
      ansible.builtin.debug:
        msg:
          - "Rolling back Slurm source build on {{ inventory_hostname }}"
          - "Install prefix: {{ slurm_install_prefix }}"

    - name: Remove PATH helper
      ansible.builtin.file:
        path: /etc/profile.d/slurm.sh
        state: absent

    - name: Remove Slurm install prefix
      ansible.builtin.file:
        path: "{{ slurm_install_prefix }}"
        state: absent

    - name: Remove build directory
      ansible.builtin.file:
        path: "{{ slurm_build_dir }}"
        state: absent

    - name: Show build rollback completion
      ansible.builtin.debug:
        msg:
          - "Slurm source build rollback completed on {{ inventory_hostname }}"
