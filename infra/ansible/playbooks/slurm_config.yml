---
- name: Deploy Slurm configuration
  hosts: all
  become: true
  gather_facts: false

  pre_tasks:
    - name: Load Slurm build vars explicitly
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../vars/slurm_build.yml"

    - name: Load host-specific vars explicitly
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../host_vars/{{ inventory_hostname }}.yml"

  tasks:
    - name: Ensure Slurm config directory exists
      ansible.builtin.file:
        path: "{{ slurm_sysconfdir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Deploy slurm.conf
      ansible.builtin.template:
        src: "{{ playbook_dir }}/../templates/slurm.conf.j2"
        dest: "{{ slurm_sysconfdir }}/slurm.conf"
        owner: root
        group: root
        mode: "0644"
