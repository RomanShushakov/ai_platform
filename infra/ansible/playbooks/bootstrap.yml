---
- name: Bootstrap baseline packages
  hosts: all
  become: true
  gather_facts: true

  pre_tasks:
    - name: Load shared vars explicitly
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../vars/common.yml"

    - name: Load host-specific vars explicitly
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../host_vars/{{ inventory_hostname }}.yml"

  tasks:
    - name: Show bootstrap target
      ansible.builtin.debug:
        msg:
          - "Bootstrapping host {{ inventory_hostname }}"
          - "Role: {{ node_role }}"
          - "Interpreter: {{ ansible_python_interpreter }}"

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install common bootstrap packages
      ansible.builtin.apt:
        name: "{{ bootstrap_common_packages }}"
        state: present

    - name: Show completion message
      ansible.builtin.debug:
        msg:
          - "Bootstrap completed on {{ inventory_hostname }}"
          - "Installed packages: {{ bootstrap_common_packages | join(', ') }}"
