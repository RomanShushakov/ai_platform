---
- name: Roll back Slurm prerequisites
  hosts: all
  become: true
  gather_facts: true

  pre_tasks:
    - name: Load shared Slurm vars explicitly
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../vars/slurm.yml"

    - name: Load host-specific vars explicitly
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../host_vars/{{ inventory_hostname }}.yml"

  tasks:
    - name: Show Slurm prereqs rollback target
      ansible.builtin.debug:
        msg:
          - "Rolling back Slurm prerequisites on {{ inventory_hostname }}"
          - "Role: {{ node_role }}"
          - "Slurm node type: {{ slurm_node_type }}"

    - name: Stop and disable munge
      ansible.builtin.service:
        name: "{{ munge_service_name }}"
        state: stopped
        enabled: false
      failed_when: false

    - name: Stop and disable slurmctld
      ansible.builtin.service:
        name: "{{ slurm_controller_service_name }}"
        state: stopped
        enabled: false
      failed_when: false

    - name: Stop and disable slurmd
      ansible.builtin.service:
        name: "{{ slurm_worker_service_name }}"
        state: stopped
        enabled: false
      failed_when: false

    - name: Remove common Slurm prerequisite packages
      ansible.builtin.apt:
        name: "{{ slurm_packages_common }}"
        state: absent
        autoremove: true
        purge: true

    - name: Show rollback completion message
      ansible.builtin.debug:
        msg:
          - "Slurm prerequisites rollback completed on {{ inventory_hostname }}"
