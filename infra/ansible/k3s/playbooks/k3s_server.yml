---
- name: Install K3s server on Raspberry
  hosts: slurm_controller
  become: true
  gather_facts: true

  pre_tasks:
    - name: Load K3s vars explicitly
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../vars/k3s.yml"

    - name: Load host-specific vars explicitly
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../../host_vars/{{ inventory_hostname }}.yml"

  tasks:
    - name: Show K3s server target
      ansible.builtin.debug:
        msg:
          - "Installing K3s server on {{ inventory_hostname }}"

    - name: Install K3s server
      ansible.builtin.shell: |
        curl -sfL https://get.k3s.io | \
          INSTALL_K3S_EXEC="server --write-kubeconfig-mode 644" \
          sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Ensure k3s service is enabled and started
      ansible.builtin.service:
        name: k3s
        enabled: true
        state: started

    - name: Show K3s server completion
      ansible.builtin.debug:
        msg:
          - "K3s server installed on {{ inventory_hostname }}"
