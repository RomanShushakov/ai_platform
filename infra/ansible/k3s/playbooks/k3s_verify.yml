---
- name: Verify K3s cluster
  hosts: slurm_controller
  become: true
  gather_facts: false

  pre_tasks:
    - name: Load K3s vars explicitly
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../vars/k3s.yml"

  tasks:
    - name: Check node list
      ansible.builtin.command: kubectl get nodes -o wide
      register: k3s_nodes
      changed_when: false

    - name: Check cluster info
      ansible.builtin.command: kubectl cluster-info
      register: k3s_info
      changed_when: false

    - name: Show K3s verification
      ansible.builtin.debug:
        msg:
          - "{{ k3s_info.stdout }}"
          - "{{ k3s_nodes.stdout }}"
