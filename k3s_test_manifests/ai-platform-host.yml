apiVersion: v1
kind: Namespace
metadata:
  name: ai-platform
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-platform-host
  namespace: ai-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-platform-host
  template:
    metadata:
      labels:
        app: ai-platform-host
    spec:
      containers:
        - name: ai-platform-host
          image: 192.168.178.103:5000/ai-platform-host:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: HOST_PORT
              value: "3000"
            - name: TOOL_PROVIDER
              value: "mcp"
            - name: MCP_TOOLS_BINARY
              value: "/usr/local/bin/tools-server"
            - name: LLM_BACKEND
              value: "ollama"
            - name: LLM_BASE_URL
              value: "http://ollama:11434"
            - name: LLM_CHAT_PATH
              value: "/api/chat"
            - name: LLM_MODEL
              value: "llama3.2:1b"
            - name: RETRIEVAL_BACKEND
              value: "noop"
          volumeMounts:
            - name: nfs-data
              mountPath: /mnt/nfs
      volumes:
        - name: nfs-data
          hostPath:
            path: /home/roman/nfs
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: ai-platform-host
  namespace: ai-platform
spec:
  type: NodePort
  selector:
    app: ai-platform-host
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30080
